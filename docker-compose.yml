services:
  # -------------------------
  # INFRASTRUCTURE
  # -------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DOCKER_POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${DOCKER_POSTGRES_DB:-thapcam_db}
    ports:
      - "${DOCKER_POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - thapcam_network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "${DOCKER_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - thapcam_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${DOCKER_RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${DOCKER_RABBITMQ_PASSWORD:-guest}
    ports:
      - "${DOCKER_RABBITMQ_PORT:-5672}:5672"
      - "${DOCKER_RABBITMQ_UI_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - thapcam_network

  # -------------------------
  # APPLICATIONS
  # -------------------------
  catalog-service:
    build:
      context: ./be_nestjs
      dockerfile: Dockerfile
    container_name: catalog-service
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DOCKER_POSTGRES_USER:-admin}
      DB_PASSWORD: ${DOCKER_POSTGRES_PASSWORD:-admin123}
      DB_DATABASE: nestjs_db_catalog
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key}
      # Thêm các biến khác từ be_nestjs/.env.example nếu cần
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "4000:4000"
    networks:
      - thapcam_network

  oms-service:
    build:
      context: ./be_javaspring/demo
      dockerfile: Dockerfile
    container_name: oms-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DOCKER_POSTGRES_DB:-thapcam_db}
      SPRING_DATASOURCE_USERNAME: ${DOCKER_POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${DOCKER_POSTGRES_PASSWORD:-admin123}
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8080:8080"
    networks:
      - thapcam_network

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - catalog-service
    networks:
      - thapcam_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  thapcam_network:
    driver: bridge
