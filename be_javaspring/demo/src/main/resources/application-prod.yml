server:
  port: ${PORT:8080}

spring:
  # Cấu hình PostgreSQL cho Render
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?currentSchema=java_db_order&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: java_db_order

  # Cấu hình Redis cho Render
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

  # Cấu hình RabbitMQ cho Render
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:true}

jwt:
  secret: ${JWT_SECRET}
  expiration_time: 1d

app:
  nestjs-api-url: ${NESTJS_API_URL:http://localhost:4000/api}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}

payment:
  vnpay:
    tmnCode: ${PAYMENT_VNPAY_TMN_CODE}
    hashSecret: ${PAYMENT_VNPAY_HASH_SECRET}
    url: ${PAYMENT_VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    returnUrl: ${VNPAY_RETURN_URL}
    apiUrl: ${PAYMENT_VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
  momo:
    partner-code: ${PAYMENT_MOMO_PARTNER_CODE}
    access-key: ${PAYMENT_MOMO_ACCESS_KEY}
    secret-key: ${PAYMENT_MOMO_SECRET_KEY}
    api-url: ${PAYMENT_MOMO_API_URL:https://test-payment.momo.vn/v2/gateway/api/create}
    return-url: ${MOMO_RETURN_URL}
    ipn-url: ${MOMO_IPN_URL}
  stripe:
    public-key: ${PAYMENT_STRIPE_PUBLISHABLE_KEY}
    secret-key: ${PAYMENT_STRIPE_SECRET_KEY}
    success-url: ${STRIPE_SUCCESS_URL}
    cancel-url: ${STRIPE_CANCEL_URL}
